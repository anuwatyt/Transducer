<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">KY-021 to Arduino UNO Schematic</title>
  <desc id="desc">A clean wiring schematic showing a KY-021 reed switch module connected to an Arduino UNO using VCC, GND, and digital pin D2.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f6f43"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="uno" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="wireRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <linearGradient id="wireBlack" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#4b5563"/>
    </linearGradient>
    <linearGradient id="wireYellow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .label { font-family: Arial, Helvetica, sans-serif; fill: #e5e7eb; }
      .title { font-size: 46px; font-weight: 700; }
      .subtitle { font-size: 24px; fill: #cbd5e1; }
      .small { font-size: 22px; }
      .tiny { font-size: 18px; fill: #cbd5e1; }
      .chip { fill: #0f172a; stroke: #334155; stroke-width: 3; }
      .pin { fill: #d6b37a; stroke: #8b5e34; stroke-width: 2; }
      .wire { fill: none; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
      .box { fill: rgba(255,255,255,0.05); stroke: rgba(255,255,255,0.14); stroke-width: 2; }
    </style>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>

  <text x="70" y="82" class="label title">KY-021 Wiring Schematic</text>
  <text x="70" y="120" class="label subtitle">Example connection to Arduino UNO using a digital input</text>

  <!-- Left side: KY-021 -->
  <g filter="url(#shadow)">
    <rect x="90" y="220" width="360" height="520" rx="34" fill="url(#board)" stroke="#0f5132" stroke-width="6"/>
    <rect x="128" y="260" width="284" height="178" rx="18" class="box"/>
    <rect x="170" y="290" width="200" height="50" rx="25" fill="#cbd5e1" stroke="#475569" stroke-width="3"/>
    <line x1="190" y1="315" x2="350" y2="315" stroke="#0f172a" stroke-width="4"/>
    <line x1="190" y1="305" x2="350" y2="325" stroke="#0f172a" stroke-width="4"/>
    <circle cx="180" cy="515" r="20" fill="#fbbf24" stroke="#92400e" stroke-width="4"/>
    <circle cx="180" cy="515" r="7" fill="#fff7ed"/>
    <rect x="245" y="492" width="132" height="46" rx="10" fill="#e2e8f0" stroke="#475569" stroke-width="3"/>
    <text x="271" y="523" class="label small" fill="#0f172a">OUT</text>
    <text x="148" y="605" class="label small">KY-021 Module</text>
    <text x="142" y="645" class="label tiny">VCC / GND / DO</text>
    <rect x="146" y="740" width="26" height="92" rx="7" class="pin"/>
    <rect x="208" y="740" width="26" height="92" rx="7" class="pin"/>
    <rect x="270" y="740" width="26" height="92" rx="7" class="pin"/>
    <text x="130" y="862" class="label small">VCC</text>
    <text x="195" y="862" class="label small">GND</text>
    <text x="262" y="862" class="label small">DO</text>
  </g>

  <!-- Right side: Arduino UNO -->
  <g filter="url(#shadow)">
    <rect x="790" y="165" width="520" height="610" rx="34" fill="url(#uno)" stroke="#0f172a" stroke-width="6"/>
    <rect x="828" y="205" width="444" height="94" rx="18" class="box"/>
    <text x="860" y="245" class="label title" style="font-size: 32px;">Arduino UNO</text>
    <text x="860" y="278" class="label tiny">Recommended input pin: D2</text>

    <!-- digital header -->
    <rect x="836" y="340" width="420" height="86" rx="16" fill="#0f172a" stroke="#94a3b8" stroke-width="2"/>
    <text x="854" y="373" class="label small">Digital pins</text>
    <text x="854" y="404" class="label tiny">D0 D1 D2 D3 D4 D5 D6 D7 D8 D9 D10 D11 D12 D13</text>
    <circle cx="1023" cy="377" r="12" fill="#fbbf24"/>
    <text x="1048" y="384" class="label small">D2</text>

    <!-- power header -->
    <rect x="836" y="470" width="420" height="86" rx="16" fill="#0f172a" stroke="#94a3b8" stroke-width="2"/>
    <text x="854" y="503" class="label small">Power header</text>
    <text x="854" y="534" class="label tiny">5V  GND  GND  VIN</text>
    <circle cx="901" cy="510" r="12" fill="#ef4444"/>
    <circle cx="965" cy="510" r="12" fill="#111827"/>
  </g>

  <!-- Wires -->
  <path d="M 172 740 C 172 690, 260 650, 430 650 C 575 650, 705 590, 880 545" class="wire" stroke="url(#wireRed)"/>
  <path d="M 221 740 C 221 690, 300 635, 470 635 C 630 635, 735 560, 915 520" class="wire" stroke="url(#wireBlack)"/>
  <path d="M 283 740 C 283 685, 340 600, 495 575 C 700 540, 820 455, 995 390" class="wire" stroke="url(#wireYellow)"/>

  <!-- Wire labels -->
  <g>
    <rect x="510" y="632" width="92" height="34" rx="10" fill="#7f1d1d"/>
    <text x="528" y="656" class="label small">VCC</text>

    <rect x="585" y="603" width="92" height="34" rx="10" fill="#111827"/>
    <text x="604" y="627" class="label small">GND</text>

    <rect x="690" y="510" width="78" height="34" rx="10" fill="#854d0e"/>
    <text x="711" y="534" class="label small">DO</text>
  </g>

  <!-- Legend -->
  <g>
    <rect x="90" y="60" width="470" height="122" rx="26" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
    <text x="120" y="108" class="label small">Wiring summary</text>
    <text x="120" y="145" class="label tiny">KY-021 VCC -> 5V</text>
    <text x="280" y="145" class="label tiny">KY-021 GND -> GND</text>
    <text x="120" y="172" class="label tiny">KY-021 DO  -> D2</text>
  </g>

  <text x="790" y="822" class="label tiny">Tip: Use INPUT_PULLUP in Arduino code for stable digital reading.</text>
</svg>
